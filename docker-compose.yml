version: '3.8'

services:
  backend:
    build: ./backend
    container_name: kisangat_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=host.docker.internal # Connects to your host's MySQL

  frontend:
    build: ./frontend
    container_name: kisangat_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
