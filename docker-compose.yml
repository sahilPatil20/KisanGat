services:
  db:
    image: mysql:8.0
    container_name: kisangat_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: kisangat
      MYSQL_USER: kisangat
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-root-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: kisangat_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=kisangat
      - DB_USER=kisangat
      - DB_PASSWORD=${DB_PASSWORD:-change-me}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    container_name: kisangat_frontend
    ports:
      - "5173:80"

volumes:
  mysql_data:
